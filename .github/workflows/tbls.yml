name: tbls

on:
  push:
    branches: [main]
    paths:
      - "db/migrations/**"
      - "docs/schema/**"
      - "docker-compose.yml"
      - ".tbls.yml"
      - ".github/workflows/tbls.yml"
  pull_request:
    paths:
      - "db/migrations/**"
      - "docs/schema/**"
      - "docker-compose.yml"
      - ".tbls.yml"
      - ".github/workflows/tbls.yml"

jobs:
  tbls:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: sample
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Install dbmate
        run: |
          curl -fsSL -o /usr/local/bin/dbmate https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64
          chmod +x /usr/local/bin/dbmate

      - name: Run migrations
        env:
          DATABASE_URL: mysql://root:password@127.0.0.1:3306/sample
        run: dbmate up

      - name: Setup tbls
        uses: k1LoW/setup-tbls@v1
        with:
          version: v1.92.3

      - name: tbls lint
        env:
          TBLS_DSN: mysql://root:password@127.0.0.1:3306/sample
        run: tbls lint --config .tbls.yml

      - name: tbls doc
        env:
          TBLS_DSN: mysql://root:password@127.0.0.1:3306/sample
        run: tbls doc --force --rm-dist --config .tbls.yml

      - name: Check for diff
        run: |
          git add docs/schema/
          if ! git diff --cached --exit-code --quiet; then
            echo "::error::docs/schema/ is out of date. Run 'make doc' locally and commit the changes."
            git diff --cached --stat
            exit 1
          fi
