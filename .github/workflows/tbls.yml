name: tbls

on:
  push:
    branches: [main]
    paths:
      - "db/migrations/**"
      - "docs/schema/**"
      - "docker-compose.yml"
      - ".tbls.yml"
      - ".mise.toml"
      - ".github/workflows/tbls.yml"
  pull_request:
    paths:
      - "db/migrations/**"
      - "docs/schema/**"
      - "docker-compose.yml"
      - ".tbls.yml"
      - ".mise.toml"
      - ".github/workflows/tbls.yml"

jobs:
  tbls:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: sample
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3

      - name: Run migrations
        run: mise run migrate

      - name: tbls lint
        run: mise run lint

      - name: tbls doc
        run: mise run doc

      - name: Check for diff
        run: |
          git add docs/schema/
          if ! git diff --cached --exit-code --quiet; then
            echo "::error::docs/schema/ is out of date. Run 'mise run doc' locally and commit the changes."
            git diff --cached --stat
            exit 1
          fi
