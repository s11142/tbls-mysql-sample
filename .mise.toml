[tools]
dbmate = "2.31.0"
tbls = "1.92.3"

[env]
DATABASE_URL = "mysql://root:password@127.0.0.1:3306/sample"
TBLS_DSN = "mysql://root:password@127.0.0.1:3306/sample"

[tasks.up]
description = "Start MySQL"
run = "docker compose up -d --wait"

[tasks.down]
description = "Stop MySQL"
run = "docker compose down"

[tasks.migrate]
description = "Run migrations"
run = "dbmate up"

[tasks.rollback]
description = "Rollback last migration"
run = "dbmate rollback"

[tasks.doc]
description = "Generate schema docs"
run = "tbls doc --force --rm-dist --config .tbls.yml"

[tasks.diff]
description = "Show diff between DB and docs"
run = "tbls diff --config .tbls.yml"

[tasks.lint]
description = "Lint schema"
run = "tbls lint --config .tbls.yml"
